<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Charades</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0A0E21;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
        .container{max-width:400px}
        .icon{font-size:80px;margin-bottom:24px}
        h1{font-size:28px;font-weight:700;margin-bottom:12px}
        p{font-size:16px;color:rgba(255,255,255,.6);line-height:1.6;margin-bottom:32px}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border-radius:14px;text-decoration:none;font-size:16px;font-weight:600;transition:transform .2s}
        .btn:hover{transform:translateY(-2px)}
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎭</div>
        <h1>Page Not Found</h1>
        <p>Looks like this page went off-script! Head back to the main stage.</p>
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
