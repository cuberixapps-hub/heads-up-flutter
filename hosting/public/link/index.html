<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Heads Up! - Opening App...</title>
    
    <!-- App Store Smart Banner for iOS Safari -->
    <meta name="apple-itunes-app" content="app-id=YOUR_APP_STORE_ID">
    
    <!-- Open Graph Meta Tags for Social Sharing -->
    <meta property="og:title" content="Heads Up! - The Party Game">
    <meta property="og:description" content="The ultimate party game! Hold your phone to your forehead and guess the word.">
    <meta property="og:image" content="https://heads-up-game-48f14.web.app/images/og-image.png">
    <meta property="og:url" content="https://heads-up-game-48f14.web.app">
    <meta property="og:type" content="website">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Heads Up! - The Party Game">
    <meta name="twitter:description" content="The ultimate party game! Hold your phone to your forehead and guess the word.">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0A0E21 0%, #1A1F3A 50%, #0A0E21 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 24px;
        }
        
        .container {
            text-align: center;
            max-width: 400px;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.4);
        }
        
        .logo-icon {
            font-size: 60px;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #6366F1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 32px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: none;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            color: white;
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }
        
        .btn-ios {
            background: #000;
            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        
        .btn-android {
            background: #1a73e8;
            color: white;
            box-shadow: 0 8px 30px rgba(26, 115, 232, 0.3);
        }
        
        .store-icon {
            width: 24px;
            height: 24px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        
        .content-preview {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
        }
        
        .preview-title {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        
        .preview-content {
            font-size: 20px;
            font-weight: 600;
        }
        
        .hidden {
            display: none !important;
        }
        
        footer {
            margin-top: 48px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }
        
        footer a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="logo-icon">🎮</span>
        </div>
        
        <div class="spinner" id="spinner"></div>
        
        <h1>Opening Heads Up!</h1>
        <p class="subtitle" id="status">Launching the app...</p>
        
        <!-- Content preview (shown for deck/results links) -->
        <div class="content-preview hidden" id="preview">
            <div class="preview-title" id="preview-title">Shared Deck</div>
            <div class="preview-content" id="preview-content"></div>
        </div>
        
        <div class="buttons hidden" id="buttons">
            <button class="btn btn-primary" id="openAppBtn">
                🎮 Open in App
            </button>
            
            <div class="divider">or download</div>
            
            <a href="#" class="btn btn-ios" id="iosBtn">
                <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                </svg>
                App Store
            </a>
            
            <a href="#" class="btn btn-android" id="androidBtn">
                <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
                </svg>
                Google Play
            </a>
        </div>
        
        <footer>
            <a href="https://heads-up-game-48f14.web.app">Heads Up!</a> • The Ultimate Party Game
        </footer>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - UPDATE THESE VALUES
        // ============================================
        const CONFIG = {
            // Firebase Hosting domain
            domain: 'heads-up-game-48f14.web.app',
            
            // Custom URL scheme for the app
            appScheme: 'headsup',
            
            // Android package name (from build.gradle applicationId)
            androidPackage: 'com.headsup.heads_up_game',
            
            // App Store URLs - UPDATE WITH YOUR ACTUAL IDs WHEN PUBLISHED
            iosAppStoreUrl: 'https://apps.apple.com/app/heads-up-game/id123456789',
            androidPlayStoreUrl: 'https://play.google.com/store/apps/details?id=com.headsup.heads_up_game',
            
            // Timeout before showing manual buttons (ms)
            redirectTimeout: 2000
        };

        // ============================================
        // PLATFORM DETECTION
        // ============================================
        function getPlatform() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            
            // iOS detection
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                return 'ios';
            }
            
            // Android detection
            if (/android/i.test(ua)) {
                return 'android';
            }
            
            return 'desktop';
        }

        // ============================================
        // URL PARAMETER PARSING
        // ============================================
        function getDeepLinkParams() {
            const params = new URLSearchParams(window.location.search);
            const path = window.location.pathname;
            
            // Extract parameters
            const result = {
                type: 'home',
                deckId: params.get('deckId') || params.get('id'),
                deckName: params.get('deck'),
                score: params.get('score'),
                correct: params.get('correct'),
                passed: params.get('passed'),
                ref: params.get('ref')
            };
            
            // Determine type from path or params
            if (path.includes('/deck') || result.deckId) {
                result.type = 'deck';
            } else if (path.includes('/results') || result.score) {
                result.type = 'results';
            } else if (path.includes('/invite') || result.ref) {
                result.type = 'invite';
            }
            
            return result;
        }

        // ============================================
        // DEEP LINK URL BUILDERS
        // ============================================
        function buildCustomSchemeUrl(params) {
            let path = '';
            let query = [];
            
            switch (params.type) {
                case 'deck':
                    path = '/deck';
                    if (params.deckId) query.push('deckId=' + encodeURIComponent(params.deckId));
                    break;
                case 'results':
                    path = '/results';
                    if (params.deckName) query.push('deck=' + encodeURIComponent(params.deckName));
                    if (params.score) query.push('score=' + params.score);
                    if (params.correct) query.push('correct=' + params.correct);
                    if (params.passed) query.push('passed=' + params.passed);
                    break;
                case 'invite':
                    path = '/invite';
                    if (params.ref) query.push('ref=' + encodeURIComponent(params.ref));
                    break;
                default:
                    path = '/home';
            }
            
            const queryString = query.length > 0 ? '?' + query.join('&') : '';
            return CONFIG.appScheme + ':/' + path + queryString;
        }

        function buildAndroidIntentUrl(params) {
            const customSchemeUrl = buildCustomSchemeUrl(params);
            const pathAndQuery = customSchemeUrl.split(':/')[1];
            
            // Build intent:// URL with automatic fallback to Play Store
            // Format: intent://path#Intent;scheme=xxx;package=xxx;S.browser_fallback_url=xxx;end
            const intentUrl = 'intent:/' + pathAndQuery + '#Intent;' +
                'scheme=' + CONFIG.appScheme + ';' +
                'package=' + CONFIG.androidPackage + ';' +
                'S.browser_fallback_url=' + encodeURIComponent(CONFIG.androidPlayStoreUrl) + ';' +
                'end';
            
            return intentUrl;
        }

        // ============================================
        // APP OPENING LOGIC
        // ============================================
        
        // Track if we've already tried to open the app
        let appOpenAttempted = false;
        let pageHiddenAfterOpen = false;
        
        function tryOpenApp(params) {
            if (appOpenAttempted) return;
            appOpenAttempted = true;
            
            const platform = getPlatform();
            
            if (platform === 'android') {
                // Android: Use intent:// URL with automatic Play Store fallback
                const intentUrl = buildAndroidIntentUrl(params);
                console.log('Opening Android intent:', intentUrl);
                window.location.href = intentUrl;
                
                // Show buttons after timeout (in case intent didn't work)
                setTimeout(showButtons, CONFIG.redirectTimeout);
                
            } else if (platform === 'ios') {
                // iOS: Try custom scheme, show buttons after timeout
                // Do NOT auto-redirect to App Store (unreliable detection)
                const customSchemeUrl = buildCustomSchemeUrl(params);
                console.log('Opening iOS custom scheme:', customSchemeUrl);
                
                // Listen for page becoming hidden (app opened successfully)
                const handleVisibilityChange = function() {
                    if (document.visibilityState === 'hidden') {
                        pageHiddenAfterOpen = true;
                        console.log('Page hidden - app likely opened');
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                
                // Try to open the app via custom scheme
                window.location.href = customSchemeUrl;
                
                // After timeout, show buttons (do NOT auto-redirect to store)
                setTimeout(function() {
                    // Only show buttons if page wasn't hidden (app didn't open)
                    if (!pageHiddenAfterOpen) {
                        showButtons();
                        updateStatus('App not opening? Download or try again:');
                    }
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                }, CONFIG.redirectTimeout);
                
            } else {
                // Desktop: Just show buttons immediately
                showButtons();
                updateStatus('Download Heads Up! on your mobile device');
            }
        }

        // ============================================
        // UI UPDATES
        // ============================================
        function showButtons() {
            document.getElementById('spinner').classList.add('hidden');
            document.getElementById('buttons').classList.remove('hidden');
        }

        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        function showPreview(params) {
            const preview = document.getElementById('preview');
            const title = document.getElementById('preview-title');
            const content = document.getElementById('preview-content');
            
            if (params.type === 'deck' && (params.deckId || params.deckName)) {
                title.textContent = 'Shared Deck';
                content.textContent = params.deckName 
                    ? decodeURIComponent(params.deckName) 
                    : '🎮 Play this deck!';
                preview.classList.remove('hidden');
            } else if (params.type === 'results' && params.score) {
                title.textContent = 'Shared Score';
                const deckText = params.deckName ? ' in ' + decodeURIComponent(params.deckName) : '';
                content.textContent = '🏆 ' + params.score + ' points' + deckText;
                preview.classList.remove('hidden');
            } else if (params.type === 'invite') {
                title.textContent = "You've been invited!";
                content.textContent = '🎉 Join the fun on Heads Up!';
                preview.classList.remove('hidden');
            }
        }

        function setupButtons(params) {
            const platform = getPlatform();
            const iosBtn = document.getElementById('iosBtn');
            const androidBtn = document.getElementById('androidBtn');
            const openAppBtn = document.getElementById('openAppBtn');
            
            // Set store URLs
            iosBtn.href = CONFIG.iosAppStoreUrl;
            androidBtn.href = CONFIG.androidPlayStoreUrl;
            
            // Open app button handler - allows retry
            openAppBtn.onclick = function(e) {
                e.preventDefault();
                appOpenAttempted = false; // Reset to allow retry
                pageHiddenAfterOpen = false;
                tryOpenApp(params);
            };
            
            // Hide irrelevant store button on mobile
            if (platform === 'ios') {
                androidBtn.classList.add('hidden');
            } else if (platform === 'android') {
                iosBtn.classList.add('hidden');
            }
        }

        // ============================================
        // MAIN EXECUTION
        // ============================================
        (function() {
            const params = getDeepLinkParams();
            const platform = getPlatform();
            
            console.log('Deep link params:', params);
            console.log('Platform:', platform);
            
            // Show content preview if applicable
            showPreview(params);
            
            // Setup button handlers
            setupButtons(params);
            
            // Try to open the app on mobile
            if (platform !== 'desktop') {
                tryOpenApp(params);
            } else {
                // Desktop: show buttons immediately
                showButtons();
                updateStatus('Download Heads Up! on your mobile device');
            }
        })();
    </script>
</body>
</html>
